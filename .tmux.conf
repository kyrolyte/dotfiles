# Vi Key Bindings
setw -g mode-keys vi

# Remove Bells
set -g visual-bell off
set -g bell-action none

# Status bar background/foreground
set -g status-style "bg=colour235,fg=colour250"

# Active pane border
set -g pane-active-border-style "fg=colour255"

# Inactive pane border
set -g pane-border-style "fg=colour238"

# Message/command prompt
set -g message-style "bg=colour232,fg=colour255"

# Window status (the tabs at the bottom)
set -g window-status-style "fg=colour244"
set -g window-status-current-style "fg=colour255,bold"

# Clock mode (if you use it)
set -g clock-mode-colour colour255

# Optional: Disable all colors from status bar items like battery/cpu
set -g status-left-style "fg=colour250"
set -g status-right-style "fg=colour250"

